server {
    listen 80;
    # 请将 yourdomain.com 替换为您的真实域名或云服务器 IP
    server_name yourdomain.com; 

    # =========================================================
    # 1. 代理前端 Vue 静态页面
    # 假设您的前端 build 产物 dist 最终放置在 /var/www/jobCollection/dist 下
    # =========================================================
    location / {
        root /var/www/jobCollection/dist;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # =========================================================
    # 2. 代理主接口 FastAPI (含 WebSocket 支持)
    # 因为 FastAPI 目前端口是 8000
    # =========================================================
    location /api/ {
        # 注意此处的末尾斜杠是否与您的前/后端路由约定相符
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # 允许 WebSocket 直连 (如在线咨询等功能会用到)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # =========================================================
    # 3. 代理 Admin 中台服务 (端口 8001)
    # =========================================================
    location /admin/ {
        proxy_pass http://127.0.0.1:8001/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # admin 常包含长耗时请求（如导出、批量任务）
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # =========================================================
    # 4. 代理 Grafana (端口 3000) (可选监控页面)
    # 若需内网封锁、不对外网开服务端口，可以通过 Nginx 子目录暴露
    # 注意: 如果用子目录代理 Grafana, 需要修改 grafana.ini：
    # `root_url = %(protocol)s://%(domain)s:%(http_port)s/grafana/`
    # `serve_from_sub_path = true`
    # =========================================================
    location /grafana/ {
        proxy_pass http://127.0.0.1:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # =========================================================
    # 5. 代理 Prometheus (端口 9090) (可选页面)
    # 注意: 通常不建议将 Prometheus 放在公网。
    # =========================================================
    location /prometheus/ {
        # Prometheus 的子目录代理启动参数需带上：--web.external-url=http://yourdomain.com/prometheus/
        proxy_pass http://127.0.0.1:9090/prometheus/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # =========================================================
    # 隐藏文件与防盗链
    # =========================================================
    location ~ /\. {
        deny all;
    }
}
