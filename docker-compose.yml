version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: job_postgres
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-job}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - job_net

  redis:
    image: redis:7-alpine
    container_name: job_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - job_net

  api:
    build:
      context: .
      dockerfile: jobCollectionWebApi/backend.Dockerfile
    container_name: job_api
    restart: always
    command: uvicorn jobCollectionWebApi.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./jobCollectionWebApi:/app/jobCollectionWebApi
      - ./common:/app/common
      - ./static:/app/static
      - ./.env:/app/.env
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    networks:
      - job_net

  admin:
    build:
      context: .
      dockerfile: jobCollectionWebApi/backend.Dockerfile
    container_name: job_admin
    restart: always
    command: uvicorn jobCollectionWebApi.main_admin:app --host 0.0.0.0 --port 8001
    volumes:
      - ./jobCollectionWebApi:/app/jobCollectionWebApi
      - ./common:/app/common
      - ./static:/app/static
      - ./.env:/app/.env
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    networks:
      - job_net

  worker:
    build:
      context: .
      dockerfile: jobCollectionWebApi/backend.Dockerfile
    container_name: job_worker
    restart: always
    command: celery -A jobCollectionWebApi.worker.celery_app worker --loglevel=info
    volumes:
      - ./jobCollectionWebApi:/app/jobCollectionWebApi
      - ./common:/app/common
      - ./.env:/app/.env
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
    networks:
      - job_net

  beat:
    build:
      context: .
      dockerfile: jobCollectionWebApi/backend.Dockerfile
    container_name: job_beat
    restart: always
    command: celery -A jobCollectionWebApi.worker.celery_app beat --loglevel=info
    volumes:
      - ./jobCollectionWebApi:/app/jobCollectionWebApi
      - ./common:/app/common
      - ./.env:/app/.env
    env_file:
      - .env
    environment:
      - POSTGRES_SERVER=db
      - REDIS_HOST=redis
    depends_on:
      - db
      - redis
      - worker
    networks:
      - job_net

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: job_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - job_net

  # ── Monitoring ──────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: job_prometheus
    restart: always
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - api
    networks:
      - job_net

  grafana:
    image: grafana/grafana:latest
    container_name: job_grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - job_net

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  job_net:
    driver: bridge
