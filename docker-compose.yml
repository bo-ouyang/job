version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: job_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jobpassword}
      POSTGRES_DB: ${POSTGRES_DB:-jobdb}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - job_net

  redis:
    image: redis:7-alpine
    container_name: job_redis
    restart: always
    ports:
      - "6380:6379" # Map to 6380
    networks:
      - job_net

  api:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: job_api
    restart: always
    command: uvicorn jobCollectionWebApi.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ./jobCollectionWebApi:/app/jobCollectionWebApi
      - ./common:/app/common
      - ./static:/app/static
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-jobuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-jobpassword}
      - POSTGRES_DB=${POSTGRES_DB:-jobdb}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENVIRONMENT=production
    depends_on:
      - db
      - redis
    networks:
      - job_net

  admin:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: job_admin
    restart: always
    command: uvicorn jobCollectionWebApi.main_admin:app --host 0.0.0.0 --port 8001
    volumes:
      - ./jobCollectionWebApi:/app/jobCollectionWebApi
      - ./common:/app/common
      - ./static:/app/static
    ports:
      - "8001:8001"
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-jobuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-jobpassword}
      - POSTGRES_DB=${POSTGRES_DB:-jobdb}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENVIRONMENT=production
    depends_on:
      - db
      - redis
    networks:
      - job_net

  worker:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: job_worker
    restart: always
    command: celery -A jobCollectionWebApi.worker.celery_app worker --loglevel=info
    # Mount volumes to ensure code changes are reflected
    volumes:
      - ./jobCollectionWebApi:/app/jobCollectionWebApi
      - ./common:/app/common
    environment:
      - POSTGRES_SERVER=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-jobuser}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-jobpassword}
      - POSTGRES_DB=${POSTGRES_DB:-jobdb}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - ENVIRONMENT=production
    depends_on:
      - db
      - redis
    networks:
      - job_net

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
    container_name: job_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - api
    networks:
      - job_net

volumes:
  postgres_data:

networks:
  job_net:
    driver: bridge
