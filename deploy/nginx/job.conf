# ==========================================================
# JobCollection Nginx Production Config
# Path: /etc/nginx/sites-available/job.conf
# ==========================================================

# 1) HTTP: redirect to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name your.domain.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/html;
        allow all;
    }

    return 301 https://$host$request_uri;
}

# 2) HTTPS: frontend + API + websocket + static files
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your.domain.com;

    ssl_certificate /etc/letsencrypt/live/your.domain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your.domain.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/job/dist;
    index index.html;

    charset utf-8;
    client_max_body_size 20m;
    server_tokens off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # SPA
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API + websocket
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # backend uploads
    location /static/ {
        alias /opt/job/static/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # static assets cache
    location ~* \.(?:css|js|mjs|map|jpg|jpeg|gif|png|svg|ico|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
}

