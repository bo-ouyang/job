# Prometheus configuration for Job Collection Platform
# Scrapes metrics from FastAPI, plus optional exporters

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # FastAPI application metrics
  - job_name: "fastapi"
    metrics_path: "/metrics"
    static_configs:
      # If running Prometheus in Docker and the API is on host, use "host.docker.internal:8000"
      - targets: ["api:8000"]
        labels:
          service: "job-api"

  # Prometheus self-monitoring
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
